<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Step 2: ボタンで操作</title>
  <script src="https://cdn.jsdelivr.net/npm/@ruby/head-wasm-wasi@latest/dist/browser.script.iife.js"></script>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    #message { font-size: 32px; margin: 20px 0; padding: 20px; background: white; border-radius: 8px; text-align: center; }
    button { font-size: 20px; padding: 10px 30px; margin: 5px; cursor: pointer; border: none; border-radius: 8px; color: white; }
    #greet-btn { background: #4CAF50; }
    #count-btn { background: #2196F3; }
    #reset-btn { background: #f44336; }
    .loading { color: #999; }
  </style>
</head>
<body>
  <h1>ボタンを押してみよう</h1>
  <p class="loading">Rubyを読み込み中...</p>
  <div id="message">ここにメッセージが出る</div>
  <div>
    <button id="greet-btn">あいさつ</button>
    <button id="count-btn">カウント</button>
    <button id="reset-btn">リセット</button>
  </div>

  <script type="text/ruby">
    require "js"

    document = JS.global[:document]
    document.querySelector(".loading")[:style][:display] = "none"

    message = document.getElementById("message")

    # Rubyの変数でカウントを管理
    count = 0

    # あいさつリスト（Rubyの配列）
    greetings = [
      "こんにちは！",
      "やっほー！",
      "おはよう！",
      "Hello!",
      "Bonjour!",
      "Hola!",
    ]

    # ボタンのイベントリスナーをRubyで書く
    document.getElementById("greet-btn").addEventListener("click") do
      message[:textContent] = greetings.sample  # Rubyの .sample でランダム選択
    end

    document.getElementById("count-btn").addEventListener("click") do
      count += 1
      message[:textContent] = "#{count} 回押した"
    end

    document.getElementById("reset-btn").addEventListener("click") do
      count = 0
      message[:textContent] = "リセット！"
    end
  </script>
</body>
</html>
