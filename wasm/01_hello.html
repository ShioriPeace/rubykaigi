<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Step 1: Hello Ruby in Browser</title>
  <!-- ruby.wasm を読み込む。これだけで <script type="text/ruby"> が使えるようになる -->
  <script src="https://cdn.jsdelivr.net/npm/@aspect-build/aspect-wasm-shim@0.1.1/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ruby/head-wasm-wasi@latest/dist/browser.script.iife.js"></script>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    #output { font-size: 24px; margin-top: 20px; padding: 20px; background: white; border-radius: 8px; }
    .loading { color: #999; }
  </style>
</head>
<body>
  <h1>ruby.wasm で Hello World</h1>
  <p class="loading">Rubyを読み込み中...</p>
  <div id="output"></div>

  <!--
    ここがポイント！ type="text/ruby" にすると、
    JavaScriptじゃなくてRubyのコードとして実行される。
  -->
  <script type="text/ruby">
    require "js"

    # JavaScriptの document オブジェクトにアクセス
    document = JS.global[:document]

    # loading メッセージを消す
    document.querySelector(".loading")[:style][:display] = "none"

    # Rubyの機能を使って表示内容を組み立てる
    ruby_version = RUBY_VERSION
    time = Time.now.strftime("%H:%M:%S")
    platform = RUBY_PLATFORM

    # DOMに書き込む
    output = document.getElementById("output")
    output[:innerHTML] = <<~HTML
      <p>Hello from Ruby! 🎉</p>
      <p>Ruby #{ruby_version} (#{platform})</p>
      <p>現在時刻: #{time}</p>
      <p>これはブラウザの中でRubyが動いてるよ</p>
    HTML
  </script>
</body>
</html>
