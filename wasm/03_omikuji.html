<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Step 3: おみくじ</title>
  <script src="https://cdn.jsdelivr.net/npm/@ruby/head-wasm-wasi@latest/dist/browser.script.iife.js"></script>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #1a1a2e; color: white; text-align: center; }
    #result { font-size: 64px; margin: 40px 0; min-height: 100px; }
    #fortune { font-size: 20px; color: #ccc; margin-bottom: 30px; min-height: 30px; }
    button { font-size: 24px; padding: 15px 50px; cursor: pointer; border: none; border-radius: 12px; background: #e94560; color: white; }
    button:hover { background: #c81d4e; }
    .loading { color: #666; }
  </style>
</head>
<body>
  <h1>おみくじ 🎋</h1>
  <p class="loading">Rubyを読み込み中...</p>
  <div id="result">🎋</div>
  <div id="fortune"></div>
  <button id="draw-btn" style="display:none">引く</button>

  <script type="text/ruby">
    require "js"

    document = JS.global[:document]
    document.querySelector(".loading")[:style][:display] = "none"
    document.getElementById("draw-btn")[:style][:display] = "inline-block"

    # おみくじデータ（Rubyのハッシュと配列）
    omikuji = [
      { result: "大吉", emoji: "🌟", fortune: "最高の一日になる！" },
      { result: "中吉", emoji: "✨", fortune: "いいことがありそう" },
      { result: "小吉", emoji: "😊", fortune: "ちょっとだけラッキー" },
      { result: "吉",   emoji: "🙂", fortune: "平穏な一日" },
      { result: "末吉", emoji: "😐", fortune: "焦らずいこう" },
      { result: "凶",   emoji: "💦", fortune: "気をつけて過ごそう" },
    ]

    result_el = document.getElementById("result")
    fortune_el = document.getElementById("fortune")

    document.getElementById("draw-btn").addEventListener("click") do
      # Rubyの .sample でランダム選択
      picked = omikuji.sample

      result_el[:textContent] = "#{picked[:emoji]} #{picked[:result]}"
      fortune_el[:textContent] = picked[:fortune]
    end
  </script>
</body>
</html>
